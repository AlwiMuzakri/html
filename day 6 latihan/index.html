<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="1px">
        <tr>
           <th>nama</th>
           <th>umur</th>
           <th>jurusan</th>
        </tr>
        <tr>
            <td>alwi</td>
            <td>20</td>
            <td>Ti</td>
        </tr>
        <tr>
            <td>romi</td>
            <td>22</td>
            <td>Ti</td>
        </tr>
    </table>
    <br>
    <table border="1px">
        <tr>
            <th colspan="3">jadwal kuliah</th>
        </tr>
        <tr>
            <th>hari</th>
            <th>mata kuliah</th>
            <th>jam</th>
        </tr>
        <tr>
            <td>senin</td>
            <td>kalkulus</td>
            <td>09.00</td>
        </tr>
    </table>
    <br>
    <table border="1px">
        <tr>
            <th colspan="4">bio</th>
        </tr>
        <tr>
            <th rowspan="4">nama</th>
        </tr>
        <tr>
            <td>andi</td>
        </tr>
        <tr>
            <td>tio</td>
        </tr>
        <tr>
            <td>doni</td>
        </tr>
    </table>
</body>
</html>
