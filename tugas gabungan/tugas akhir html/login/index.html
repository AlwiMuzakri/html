<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

</head>
<body>
    <header>
        <h1>login</h1>
    </header>
    <nav>
        <a href="../home.html">ke halaman home</a>
        <a href="../biodata/index.html">ke halaman biodata</a>
        <a href="../portfolio/index.html">ke halaman portofolio</a>
        <a href="index.html">ke halaman login</a>
        <a href="../register/index.html">ke halaman register</a>
    </nav>
    <main>
        <section>
            <h2>Masuk ke akun</h2>
            <form>
                <label for="email">Email</label>
                <input type="email" 
                       id="email"
                       name="email"
                       placeholder="masukan email"
                       required>
                       <br>
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="masukan password"
                       required>
                       <br>
                <input type="checkbox"
                       id="remember">
                <label for="remember">Ingat saya</label>
                       <br>
                <button type="submit">login</button>
                <br>
                <label for="">Belum punya akun?</label>
                <a href="../register/index.html" target="_blank">daftar</a>
            </form>
        </section>
    </main>
    <footer>
        <p>©2026 Alwi Muzakri</p>
    </footer>
